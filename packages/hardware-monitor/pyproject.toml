[project]
name = "jarvis-skills-hardware-monitor"
version = "0.1.0"
description = "Hardware monitoring and control skills for JARVIS"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "PROJECT-JARV1S" }
]
keywords = ["jarvis", "mcp", "skills", "hardware", "system", "volume", "network"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "jarvis-skills-core>=0.1.0",
    "psutil>=5.9.0",
]

[project.optional-dependencies]
windows = [
    "pycaw>=20230407",
    "comtypes>=1.2.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jarvis_skills_hardware_monitor"]
